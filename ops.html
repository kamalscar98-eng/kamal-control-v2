<title>Kamal Control — Ops Add-on</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<style>
:root{--bg:#0b1220;--panel:#111a2e;--panel2:#0e1626;--line:#22304d;--txt:#e7ecf5;--mut:#93a1bd;--accent:#4f7cff;--accent2:#2e5496;--good:#1f9d57;--goodbg:#0f2e1f;--warn:#b7791f;--warnbg:#2e2410;--bad:#c0392b;--badbg:#2e1414;--chip:#1a2540;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
a{color:var(--accent)}
.app{display:flex;min-height:100vh}
.side{width:238px;flex:0 0 238px;background:linear-gradient(180deg,#0c1424,#0a1120);border-right:1px solid var(--line);padding:14px 10px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{font-weight:800;font-size:16px;padding:6px 8px 2px}
.brand small{display:block;color:var(--mut);font-weight:600;font-size:11px;margin-top:2px}
.sec{color:var(--mut);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin:16px 8px 6px}
.navi{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;color:#cdd6ea;font-weight:600}
.navi:hover{background:#152038}
.navi.on{background:var(--accent);color:#fff}
.navi .em{width:18px;text-align:center}
.main{flex:1;min-width:0;padding:20px 24px;max-width:1200px}
.h1{font-size:20px;font-weight:800;margin:0 0 2px}
.sub{color:var(--mut);margin:0 0 16px;font-size:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.row{display:flex;flex-wrap:wrap;gap:12px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:150px;flex:1}
.kpi .n{font-size:24px;font-weight:800}
.kpi .l{color:var(--mut);font-size:12px;margin-top:2px}
label{display:block;font-size:12px;color:var(--mut);margin:8px 0 4px;font-weight:600}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font:inherit}
textarea{min-height:70px;resize:vertical}
button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer}
button.sec{background:var(--chip);color:#cdd6ea;border:1px solid var(--line)}
button.danger{background:var(--bad)}
button:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;background:var(--panel)}
td.wrap,th.wrap{white-space:normal}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-good{background:var(--goodbg);color:#6ee7a0}
.b-warn{background:var(--warnbg);color:#f3c969}
.b-bad{background:var(--badbg);color:#ff9b8f}
.b-mut{background:var(--chip);color:var(--mut)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.bar{height:8px;background:var(--chip);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent)}
.flagchip{background:var(--badbg);color:#ff9b8f;border-radius:6px;padding:1px 6px;font-size:11px;margin-right:4px;font-weight:700}
.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:12px}
.toolbar>div{min-width:150px}
.right{margin-left:auto}
.note{color:var(--mut);font-size:12px}
.pill{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;color:#cdd6ea}
.hd{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.msg{padding:10px 12px;border-radius:8px;margin:10px 0;font-weight:600}
.msg.ok{background:var(--goodbg);color:#6ee7a0}
.msg.err{background:var(--badbg);color:#ff9b8f}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login{width:340px}
.foot{color:var(--mut);font-size:11px;margin-top:18px;border-top:1px solid var(--line);padding-top:10px}
.scroll{overflow:auto;max-height:60vh}
</style>
</head>

  async del(key){ const {error}=await sb.from('kamal_control_kv').delete().eq('key',key); if(error) throw error; },
};

const todayISO = ()=>{ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); };
const daysBetween=(a,b)=> Math.round((new Date(b)-new Date(a))/86400000);
const fmt=(d)=> d? new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'}) : '—';

function computeFlags(rec, existing){
  const f=[];
  const isCoach = rec.type && rec.type.startsWith('Coaching');
  const isMeet = rec.type==='Meeting'||isCoach;
  const dup = (existing||[]).some(m=> m.team===rec.team && m.agentName===rec.agentName && m.date===rec.date && m.type===rec.type);
  if(dup) f.push('DUPLICATE');
  if(isMeet && (!rec.durationMin || Number(rec.durationMin)<3)) f.push('CHECK DURATION');
  if(isCoach && !(rec.notes||'').trim()) f.push('NO NOTES');
  if(rec.date> todayISO()) f.push('FUTURE DATE');
  return f;
}

  useEffect(()=>{ setRoster(null); load(); },[load]);
  const persist=async(next)=>{ setSaving(true); setMsg(null); try{ await KV.set('ko_roster_'+campaign,next); setRoster(next); setMsg({t:'ok',m:'Saved to database.'});}catch(e){setMsg({t:'err',m:'Save failed: '+e.message});} setSaving(false); };
  const importSeed=async()=>{ if(campaign!=='ssdi'){setMsg({t:'err',m:'Starter roster is only available for the SSDI campaign.'});return;} if(!confirm('Import '+SEED_ROSTER.length+' starter agents into this campaign roster? You can edit/remove afterwards.'))return; await persist(SEED_ROSTER.map(a=>({...a}))); };

function SubmitMeeting({campaign, teams, user, perms}){
  const scopeTeams = user.role==='tl' ? (user.team?[user.team]:teams) : (user.role==='manager'&&user.team?[user.team]:teams);
  const [roster,setRoster]=useState([]);
  const [team,setTeam]=useState(scopeTeams[0]||'');
  const [form,setForm]=useState(()=>blank());
  const [msg,setMsg]=useState(null);
  const [busy,setBusy]=useState(false);
  function blank(){ return {date:todayISO(),agentName:'',type:'Coaching (Verbal)',channel:'Call',durationMin:'',reason:'Performance',kpiRef:'',notes:'',theme:'Tonality',incident:'No',action:'',followup:'N/A'}; }
  useEffect(()=>{ (async()=>{ const r=await KV.get('ko_roster_'+campaign); setRoster(Array.isArray(r)?r:[]); })(); },[campaign]);
  useEffect(()=>{ if(!scopeTeams.includes(team)) setTeam(scopeTeams[0]||''); },[campaign]);
  const agents = roster.filter(a=>a.active && a.team===team);
  const submit=async()=>{
    if(!form.agentName){ setMsg({t:'err',m:'Pick an agent.'}); return; }
    setBusy(true); setMsg(null);
    try{
      const existing = (await KV.prefix('ko_meeting_'+campaign+'_')).map(r=>r.value);
      const rec={...form, id:'m_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), campaignId:campaign, team,
        loggedById:user.id, loggedByName:user.name, loggedByRole:user.role, createdAt:new Date().toISOString()};
      rec.flags=computeFlags(rec, existing);
      await KV.insert('ko_meeting_'+campaign+'_'+rec.id, rec);
      setMsg({t:'ok',m:'Logged ✓ Saved to database'+(rec.flags.length?(' · flags: '+rec.flags.join(', ')):'')});
      setForm(blank());
    }catch(e){ setMsg({t:'err',m:'Save failed: '+e.message}); }
    setBusy(false);
  };
  return <div>
    <div className="hd"><div><div className="h1">Submit Meeting / Coaching</div><div className="sub">Logged as {user.name} · saves instantly to the database</div></div></div>
    {msg && <div className={"msg "+(msg.t==='ok'?'ok':'err')}>{msg.m}</div>}
    <div className="card">
      <div className="grid3">
        <div><label>Team *</label><select value={team} onChange={e=>{setTeam(e.target.value);setForm(f=>({...f,agentName:''}));}} disabled={scopeTeams.length<=1}>{scopeTeams.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label>Agent *</label><select value={form.agentName} onChange={e=>setForm(f=>({...f,agentName:e.target.value}))}><option value="">— select —</option>{agents.map(a=><option key={a.id}>{a.name}</option>)}</select></div>
        <div><label>Date *</label><input type="date" max={todayISO()} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
        <div><label>Activity type *</label><select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{ACTIVITY_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label>Channel</label><select value={form.channel} onChange={e=>setForm(f=>({...f,channel:e.target.value}))}>{CHANNELS.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label>Duration (min)</label><input type="number" min="0" value={form.durationMin} onChange={e=>setForm(f=>({...f,durationMin:e.target.value}))}/></div>
        <div><label>Reason / trigger</label><select value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}>{REASONS.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label>Performance / KPI ref</label><input value={form.kpiRef} onChange={e=>setForm(f=>({...f,kpiRef:e.target.value}))} placeholder="e.g. transfers, QA 82%"/></div>
        <div><label>Main theme</label><select value={form.theme} onChange={e=>setForm(f=>({...f,theme:e.target.value}))}>{THEMES.map(t=><option key={t}>{t}</option>)}</select></div>
      </div>
      <label>Feedback / coaching notes</label>
      <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="What was discussed / coached…"/>
      <div className="grid3">
        <div><label>Incident?</label><select value={form.incident} onChange={e=>setForm(f=>({...f,incident:e.target.value}))}><option>No</option><option>Yes</option></select></div>
        <div><label>Follow-up</label><select value={form.followup} onChange={e=>setForm(f=>({...f,followup:e.target.value}))}>{FOLLOWUP.map(t=><option key={t}>{t}</option>)}</select></div>

function Analysis({campaign, teams, user}){
  const [meetings,setMeetings]=useState(null);
  const [roster,setRoster]=useState([]);
  const [from,setFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-27);return d.toISOString().slice(0,10);});
  const [to,setTo]=useState(todayISO());
  const load=useCallback(async()=>{ const [m,r]=await Promise.all([KV.prefix('ko_meeting_'+campaign+'_'), KV.get('ko_roster_'+campaign)]); setMeetings(m.map(x=>x.value)); setRoster(Array.isArray(r)?r:[]); },[campaign]);
  useEffect(()=>{ setMeetings(null); load(); },[load]);
  const inRange = useMemo(()=> (meetings||[]).filter(m=> m.date>=from && m.date<=to), [meetings,from,to]);
  if(meetings===null) return <div className="card">Loading analysis…</div>;
  const isCoach=t=> t&&t.startsWith('Coaching');
  const teamRows = teams.map(t=>{
    const ms=inRange.filter(m=>m.team===t);
    const active=roster.filter(a=>a.active&&a.team===t);
    const touched=new Set(ms.map(m=>m.agentName));
    const durs=ms.map(m=>Number(m.durationMin)).filter(x=>x>0);
    return {team:t, size:active.length, total:ms.length,
      meetings:ms.filter(m=>m.type==='Meeting').length,
      coach:ms.filter(m=>isCoach(m.type)).length,
      mon:ms.filter(m=>m.type==='Monitoring/QA').length,
      perf:ms.filter(m=>m.reason==='Performance').length,
      touched:touched.size, cov: active.length? touched.size/active.length:0,
      avg: durs.length? (durs.reduce((a,b)=>a+b,0)/durs.length):0,
      inc:ms.filter(m=>m.incident==='Yes').length,
      act:ms.filter(m=>(m.action||'').trim()).length,
      open:ms.filter(m=>m.followup==='Open').length,
      flag:ms.filter(m=>(m.flags||[]).length).length};
  });
  const tot=(k)=> teamRows.reduce((a,b)=>a+b[k],0);
  const agents = roster.filter(a=>a.active);
  const cov = agents.map(a=>{
    const ms=inRange.filter(m=>m.agentName===a.name && m.team===a.team);
    const all=(meetings||[]).filter(m=>m.agentName===a.name&&m.team===a.team);
    const last= all.length? all.map(m=>m.date).sort().slice(-1)[0]:null;
    const since= last? daysBetween(last, todayISO()):null;
    const status= !last?'NEVER':(since>7?'NEGLECTED':'OK');
    return {name:a.name,team:a.team,last,since,touch:ms.length,coach:ms.filter(m=>isCoach(m.type)).length,inc:ms.filter(m=>m.incident==='Yes').length,perf:ms.filter(m=>m.reason==='Performance').length,status};
  }).sort((a,b)=> (a.status==='NEVER'?-2:a.status==='NEGLECTED'?-1:0)-(b.status==='NEVER'?-2:b.status==='NEGLECTED'?-1:0) || (b.since||0)-(a.since||0));
  const themeCounts=THEMES.map(t=>({t,n:inRange.filter(m=>m.theme===t).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const maxTheme=Math.max(1,...themeCounts.map(x=>x.n));
  const incTot=inRange.filter(m=>m.incident==='Yes');
  const incActioned=incTot.filter(m=>(m.action||'').trim()).length;
  const setQuick=(days)=>{const d=new Date();d.setDate(d.getDate()-days+1);setFrom(d.toISOString().slice(0,10));setTo(todayISO());};
  return <div>
    <div className="hd"><div><div className="h1">Analysis <span className="pill">CEO / Manager</span></div><div className="sub">Live from the database · {inRange.length} activities in range</div></div></div>
    <div className="card"><div className="toolbar">
      <div><label>From</label><input type="date" value={from} onChange={e=>setFrom(e.target.value)}/></div>
      <div><label>To</label><input type="date" value={to} onChange={e=>setTo(e.target.value)}/></div>
      <div style={{minWidth:'auto',display:'flex',gap:6,alignItems:'end'}}>
        <button className="sec" onClick={()=>setQuick(7)}>7d</button>
        <button className="sec" onClick={()=>setQuick(28)}>28d</button>
        <button className="sec" onClick={()=>setQuick(90)}>90d</button>
        <button className="sec" onClick={load}>↻ Refresh</button>
      </div>
    </div>
    <div className="row">
      <div className="kpi"><div className="n">{inRange.length}</div><div className="l">Total activities</div></div>
      <div className="kpi"><div className="n">{tot('coach')}</div><div className="l">Coachings</div></div>
      <div className="kpi"><div className="n">{tot('meetings')}</div><div className="l">Meetings</div></div>
      <div className="kpi"><div className="n">{tot('perf')}</div><div className="l">Performance-driven</div></div>
      <div className="kpi"><div className="n">{incTot.length}</div><div className="l">Incidents</div></div>
      <div className="kpi"><div className="n">{cov.filter(a=>a.status!=='OK').length}</div><div className="l">Neglected / never</div></div>
    </div></div>

    <div className="card"><div className="h1" style={{fontSize:16,marginBottom:8}}>TL / Team Scorecard</div><div className="scroll">
      <table><thead><tr><th>Team</th><th>Active</th><th>Total</th><th>Meet</th><th>Coach</th><th>Monitor</th><th>Perf</th><th>Agents touched</th><th>Coverage</th><th>Avg dur</th><th>Incidents</th><th>Actioned</th><th>Open</th><th>Flagged</th></tr></thead>
      <tbody>{teamRows.map(r=><tr key={r.team}><td>{r.team}</td><td>{r.size}</td><td>{r.total}</td><td>{r.meetings}</td><td>{r.coach}</td><td>{r.mon}</td><td>{r.perf}</td><td>{r.touched}</td>
        <td><span className={"badge "+(r.cov>=0.75?'b-good':r.cov>=0.4?'b-warn':'b-bad')}>{Math.round(r.cov*100)}%</span></td>
        <td>{r.avg?r.avg.toFixed(1):'—'}</td><td>{r.inc?<span className="badge b-bad">{r.inc}</span>:'0'}</td><td>{r.act}</td><td>{r.open}</td><td>{r.flag?<span className="badge b-warn">{r.flag}</span>:'0'}</td></tr>)}
      </tbody></table></div>
    </div>

    <div className="grid2">
      <div className="card"><div className="h1" style={{fontSize:16,marginBottom:8}}>Agent Coverage</div><div className="scroll">
        <table><thead><tr><th>Agent</th><th>Team</th><th>Last</th><th>Days</th><th>Touch</th><th>Coach</th><th>Inc</th><th>Status</th></tr></thead>
        <tbody>{cov.map(a=><tr key={a.team+a.name}><td className="wrap">{a.name}</td><td>{a.team}</td><td>{fmt(a.last)}</td><td>{a.since==null?'—':a.since}</td><td>{a.touch}</td><td>{a.coach}</td><td>{a.inc||'—'}</td>
          <td><span className={"badge "+(a.status==='OK'?'b-good':a.status==='NEGLECTED'?'b-warn':'b-bad')}>{a.status}</span></td></tr>)}
        {cov.length===0&&<tr><td colSpan="8" className="note">No active agents in roster.</td></tr>}</tbody></table></div>
      </div>
      <div>
        <div className="card"><div className="h1" style={{fontSize:16,marginBottom:8}}>Incidents &amp; Actions</div>
          <div className="row"><div className="kpi"><div className="n">{incTot.length}</div><div className="l">Incidents</div></div>
          <div className="kpi"><div className="n">{incTot.length?Math.round(incActioned/incTot.length*100):0}%</div><div className="l">With action</div></div>
          <div className="kpi"><div className="n">{inRange.filter(m=>m.followup==='Open').length}</div><div className="l">Open follow-ups</div></div></div>
        </div>
        <div className="card"><div className="h1" style={{fontSize:16,marginBottom:8}}>Coaching Themes</div>
          {themeCounts.length===0 && <div className="note">No themes in range.</div>}
          {themeCounts.map(x=><div key={x.t} style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:12}}><span>{x.t}</span><span className="note">{x.n}</span></div><div className="bar"><i style={{width:(x.n/maxTheme*100)+'%'}}></i></div></div>)}
        </div>
      </div>
    </div>
    <div className="foot">Data source: your Supabase database (keys <code>ko_meeting_{campaign}_*</code> and <code>ko_roster_{campaign}</code>). Nothing here reads or writes your existing app keys.</div>
  </div>;
}

  const [pw,setPw]=useState(''); const [err,setErr]=useState('');
  const go=()=>{ const u=users.find(x=>x.id===id); if(!u){setErr('Pick a user');return;} if(u.password!=null && String(u.password)!==pw){ setErr('Wrong password'); return; } onLogin(u); };
  return <div className="center"><div className="card login">
    <div className="brand" style={{padding:0,marginBottom:12}}>⚡ Kamal Control<small>Ops Add-on</small></div>
    <label>User</label><select value={id} onChange={e=>setId(e.target.value)}>{users.filter(u=>u.active!==false).map(u=><option key={u.id} value={u.id}>{u.name} · {u.role}</option>)}</select>
    <label>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
    {err&&<div className="msg err">{err}</div>}
    <button style={{width:'100%',marginTop:12}} onClick={go}>Sign in</button>
    <div className="note" style={{marginTop:10}}>Tip: if you're already signed into the main app in this browser, this opens without asking.</div>
  </div></div>;
}

function App(){
  const [users,setUsers]=useState(null);
  const [user,setUser]=useState(null);
  const [campaigns,setCampaigns]=useState([]);
  const [campaign,setCampaign]=useState('ssdi');
  const [cfg,setCfg]=useState({});
  const [page,setPage]=useState('submit');
  const [err,setErr]=useState('');

  useEffect(()=>{ (async()=>{ try{
    const [u,c]=await Promise.all([KV.get('ko_users'),KV.get('ko_campaigns')]);
    const us=Array.isArray(u)?u:[]; setUsers(us);
    const cs=Array.isArray(c)?c:[]; setCampaigns(cs);
    let ac='ssdi'; try{ ac=JSON.parse(localStorage.getItem('ko_active_campaign'))||localStorage.getItem('ko_active_campaign')||'ssdi'; }catch(e){}
    if(cs.length && !cs.some(x=>x.id===ac)) ac=cs[0].id;
    setCampaign(ac);
    let sess=null; try{ sess=JSON.parse(localStorage.getItem('ko_session')); }catch(e){}
    if(sess&&sess.id){ const me=us.find(x=>x.id===sess.id); if(me) setUser(me); }
  }catch(e){ setErr('Could not connect to database: '+e.message); } })(); },[]);

  useEffect(()=>{ if(!campaign) return; (async()=>{ try{ const c=await KV.get('ko_config_'+campaign); setCfg(c||{}); }catch(e){} })(); },[campaign]);

  const teams = useMemo(()=> (cfg&&cfg.teams? cfg.teams.map(t=>t.name):[]), [cfg]);
  const doLogin=(u)=>{ try{ localStorage.setItem('ko_session',JSON.stringify({id:u.id})); }catch(e){} setUser(u); };
  const signOut=()=>{ try{ localStorage.removeItem('ko_session'); }catch(e){} setUser(null); };

  if(err) return <div className="center"><div className="card login"><div className="msg err">{err}</div></div></div>;
  if(users===null) return <div className="center"><div className="note">Loading…</div></div>;
  if(!user) return <Login users={users} onLogin={doLogin}/>;

  const role=user.role;
  const perms={ submit: ['tl','manager','ceo'].includes(role), viewRoster:['ceo','manager'].includes(role), editRoster: role==='ceo', viewAnalysis:['ceo','manager'].includes(role) };
  // default page per role
  const allowed = { submit:perms.submit, mine:perms.submit, roster:perms.viewRoster, analysis:perms.viewAnalysis };
  const curr = allowed[page]? page : (perms.submit?'submit':(perms.viewAnalysis?'analysis':'roster'));

  return <div className="app">
    <Sidebar user={user} page={curr} setPage={setPage} campaign={campaign} campaigns={campaigns} setCampaign={setCampaign} perms={perms} signOut={signOut}/>
    <div className="main">
      {curr==='submit' && perms.submit && <SubmitMeeting campaign={campaign} teams={teams} user={user} perms={perms}/>}
      {curr==='mine' && perms.submit && <MySubmissions campaign={campaign} user={user}/>}
      {curr==='roster' && perms.viewRoster && <AgentMaster campaign={campaign} teams={teams} user={user} perms={perms}/>}
      {curr==='analysis' && perms.viewAnalysis && <Analysis campaign={campaign} teams={teams} user={user}/>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
